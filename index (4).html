<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlash: Interactive Concept Sandbox</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo"><i class="fa-solid fa-layer-group"></i> EduFlash</div>
        <div class="tracker">Concept: <span id="current-index">1</span> / <span id="total-count">3</span></div>
    </header>

    <main class="stage">
        <div class="flashcard-viewport">
            <div class="flashcard-inner" id="flashcard" onclick="flipCard()">
                
                <div class="card-face card-front">
                    <span class="badge">Data Structures</span>
                    <h2 id="question-text">Loading question...</h2>
                    <div class="hint"><i class="fa-solid fa-arrow-rotate-left"></i> Click to Flip & View Loop</div>
                </div>

                <div class="card-face card-back">
                    <span class="badge success">Visual Execution</span>
                    <div class="loop-container">
                        <div class="animated-node" id="animation-node"></div>
                    </div>
                    <p id="answer-text">Loading explanation...</p>
                </div>

            </div>
        </div>

        <div class="control-dock">
            <button class="btn btn-secondary" onclick="navigateCard(-1)"><i class="fa-solid fa-chevron-left"></i> Prev</button>
            <button class="btn btn-primary" onclick="navigateCard(1)">Next <i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
